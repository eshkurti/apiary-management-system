# Codeception Test Suite Configuration

# suite for functional (integration) tests.
# emulate web requests and make application process them.

# RUN `build` COMMAND AFTER ADDING/REMOVING MODULES.
actor: FunctionalTester
modules:
    enabled:
        - Filesystem
        - Yii2:
            # Wrap every test in a transaction and reload fixtures between
            # tests so records created during a checkout test (orders, order
            # items, stock changes) are rolled back and cannot leak forward.
            cleanup: true
        - Asserts
        - frontend\tests\Support\Helper\Functional
